<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Summit Tax Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #2c3e50;
               min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 10px; padding: 32px; max-width: 360px; width: 100%;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { color: #1a5276; font-size: 1.3em; margin-bottom: 18px; text-align: center; }
        label { display: block; font-size: 0.85em; color: #7f8c8d; margin-bottom: 6px; }
        input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 6px;
                                  font-size: 1em; margin-bottom: 14px; }
        button { width: 100%; background: #1a5276; color: #fff; border: none; border-radius: 6px; padding: 11px;
                 font-size: 1em; font-weight: 600; cursor: pointer; }
        button:hover { background: #154360; }
        .error { background: #fdecea; color: #c0392b; padding: 10px 12px; border-radius: 6px; font-size: 0.85em;
                 margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Summit Tax Services — Admin</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required>
        <button type="submit">Log In</button>
    </form>
</div>
</body>
</html>
